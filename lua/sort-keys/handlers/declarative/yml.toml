# The `.yml` extension shares the YAML handler. This file mirrors yaml.toml
# so the registry's per-filetype lookup finds it without special-casing the
# loader.

description = "YAML declarative handler (yml alias)"

can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

comment_aware = true

mixed_key_types = false

query_file = "sort-keys.scm"
