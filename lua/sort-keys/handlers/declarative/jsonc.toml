description = "JSONC declarative handler"

# tree-sitter-json's grammar already accepts JSONC's // and /* */ comments
# as `(comment)` nodes, so we reuse the json parser rather than requiring
# users to install a separate jsonc parser binary.
parser_lang = "json"

can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

comment_aware = true

mixed_key_types = false

# Inter-entry separator as a literal character (mirrors json.toml).
structural_separator = ","

# JSONC explicitly allows the optional trailing comma; preserve it across
# reorder rather than silently rewriting the user's style.
trailing_separator_allowed = true

query_file = "sort-keys.scm"
