description = "TypeScript declarative handler"

can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

comment_aware = true

mixed_key_types = false

# ES5+ semantics: TypeScript allows the optional trailing comma on object /
# array literals.
structural_separator = ","
trailing_separator_allowed = true

query_file = "sort-keys.scm"
