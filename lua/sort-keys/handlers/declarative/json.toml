description = "JSON declarative handler"

can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

comment_aware = false
comment_strategy = "none"

# ", " is the conventional JSON separator and what every e2e fixture uses;
# emitting the same string keeps formatter-style diffs minimal.
default_separator_object = ", "
default_separator_array = ", "

mixed_key_types = false

query_file = "sort-keys.scm"
