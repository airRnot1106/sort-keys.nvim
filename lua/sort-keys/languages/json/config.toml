description = "JSON handler"

can_sort_object = true
can_sort_array = true

# JSON has no comments; the extractor skips comment folding when false.
comment_aware = false

# The separator (",") and trailing-comma policy are NOT configured: extract
# observes them from the source and render reproduces them. Only the parser
# and capabilities live here.
parser_lang = "json"

query_file = "sort-keys.scm"
