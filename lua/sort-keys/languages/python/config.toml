description = "Python handler"

can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

comment_aware = true

# Python dict keys can be str / int / float / bool / None / identifier — the
# normalizer hands back their surface text, so a mixed-type container still
# yields a stable ordering across heterogeneous keys.
mixed_key_types = true

# PEP 8 permits the trailing comma on dict / list / set literals, and the
# Python grammar accepts it everywhere.
structural_separator = ","
trailing_separator_allowed = true

query_file = "sort-keys.scm"
