description = "KDL handler"

can_sort_object = true

# KDL has no array container: a node's positional arguments are
# order-significant by spec, so they are never reordered. The only sortable
# shape is a node group keyed by node name (the document root and each
# `{ ... }` children block), which is always object-like.
can_sort_array = false

can_deep = true
key_quoting = "logical"

comment_aware = true

# Node names mix bare-identifier, quoted-string, and raw-string forms in the
# same container, so per-entry normalization is required at the builder layer.
mixed_key_types = true

# KDL terminates each node with a newline (or `;`), so child nodes are
# separated by the buffer gap rather than a punctuation token. An empty
# separator makes core/separator_normalize a no-op, leaving the user's
# newline + indentation gaps untouched across a reorder (same model as the
# Pkl / Nix-list / YAML-block style).
structural_separator = ""
trailing_separator_allowed = true

query_file = "sort-keys.scm"
