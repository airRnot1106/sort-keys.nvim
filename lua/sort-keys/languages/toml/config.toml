description = "TOML handler"

can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

comment_aware = true

# TOML keys span bare / basic-string / literal-string / dotted forms in the
# same container, so per-pair normalization is required at the builder layer.
mixed_key_types = true

# TOML containers carry different inter-entry separators: inline_table /
# array use `,`, while [section] / [[array_of_tables]] / root-level pair
# groups are newline-separated with no inline comma. The builder picks
# `structural_separator` / `trailing_separator_allowed` per container by
# inspecting the underlying treesitter node type rather than declaring them
# once here.

query_file = "sort-keys.scm"
