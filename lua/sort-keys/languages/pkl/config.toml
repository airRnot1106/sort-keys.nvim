description = "Pkl handler"

can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

comment_aware = true

# Pkl object bodies mix property entries (`name = v`), mapping entries
# (`["k"] = v`), and listing elements; the builder votes on kind per body.
mixed_key_types = true

# Pkl separates entries by newline/whitespace, not a punctuation token, so the
# inter-entry gap carries the separation (same model as Nix lists / YAML block
# style). An empty separator makes core/separator_normalize a no-op, leaving
# the user's newline + indentation gaps untouched across a reorder.
structural_separator = ""
trailing_separator_allowed = true

query_file = "sort-keys.scm"
