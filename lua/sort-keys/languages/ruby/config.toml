description = "Ruby handler"

# Three sortable container shapes, all keyword-keyed:
#   hash          (a `{ ... }` literal)
#   argument_list (a method call's argument list, paren or paren-less)
#   hash_pattern  (a `case`/`in` hash pattern; members are keyword_patterns)
#
# A list is captured only when it holds at least one keyword member; a
# positional-only call, an array literal, or an all-splat hash carries none and
# falls through to "no sortable structure under cursor". Positional arguments,
# `*`/`**` splats, and block args carry no `key` field, so the builder pins
# them (movable=false) and they keep their slot while the keyword pairs sort.
can_sort_object = true
can_sort_array = false
can_deep = true
key_quoting = "logical"

# `#` line comments hang off the hash / argument list as siblings of the
# pairs; the standard comment_attach path carries them with the next entry.
comment_aware = true

# A single hash can mix symbol (`a:`), string (`"a" =>`), and other key shapes,
# so per-pair normalization is required.
mixed_key_types = true

# Pairs are `,`-separated; a trailing comma before the closing delimiter is
# legal Ruby, so it is preserved when present.
structural_separator = ","
trailing_separator_allowed = true

query_file = "sort-keys.scm"
