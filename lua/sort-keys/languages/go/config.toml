description = "Go handler"

# Three Go container shapes reach this layer — all name-keyed:
#   field_declaration_list (struct definition body)
#   literal_value          (struct or map composite-literal body; the builder
#                           filters out slice / array bodies whose entries
#                           are positional `literal_element` children)
#   import_spec_list       (a parenthesized import group)
#
# `expression_switch_statement` / `type_switch_statement` are intentionally
# excluded: case order is semantically significant. `const_declaration` /
# `var_declaration` blocks are excluded because `iota` makes the value of
# each spec depend on its index. Slice / array composite literals are
# positional and never reordered.
can_sort_object = true
can_sort_array = true
can_deep = true
key_quoting = "logical"

# `//` and `/* */` comments anchor to the next entry; the standard
# comment_attach path handles it.
comment_aware = true

# Map keys can be string / int / typed identifiers; struct field names are
# bare identifiers. Mixed within a single container is rare but legal
# (e.g. `map[any]int`).
mixed_key_types = true

# `structural_separator` / `trailing_separator_allowed` are decided per
# container shape by the builder, not declared here: Go uses two distinct
# conventions — composite-literal bodies are `,`-separated (trailing comma
# required when the closing brace is on its own line), while struct-definition
# / import-block bodies are newline-separated with no inline separator. The
# builder owns this via `separator_for_container_node_type`.

query_file = "sort-keys.scm"
